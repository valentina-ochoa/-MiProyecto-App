name: Client Deploy V3

on:
  push:
    tags:
      - 'v*.*.*'

  workflow_dispatch:

jobs:
  deploy:
    uses: valentina-ochoa/MiProyecto-SharedWorkflows/.github/workflows/deploy-api.yaml@pipeTest

    with:
      image-name: mi-api
      image-tag: ${{ github.ref_name }}

    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
